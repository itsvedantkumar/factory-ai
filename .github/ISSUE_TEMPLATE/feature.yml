name: Feature request
description: Propose a scoped product improvement
title: "feat: "
labels: [enhancement]
body:
  - type: textarea
    attributes:
      label: Problem
      description: What user problem should be solved?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Proposed outcome
      description: Describe observable acceptance criteria, not implementation preference.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Security and cost impact
